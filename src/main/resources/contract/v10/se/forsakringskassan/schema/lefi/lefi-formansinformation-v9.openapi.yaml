        beslutatBruttobelopp:
          $ref: '#/components/schemas/LefiBelopp'
        samordnatBruttobelopp:
          $ref: '#/components/schemas/LefiBelopp'
        omfattning:
          $ref: '#/components/schemas/LefiOmfattning'
      type: object
    LefiSjukOchAktivitetsersattningSteglosAvrakning:
      description: 'Uppgifter om hur steglös avräkning har nyttjats eller nyttjas
