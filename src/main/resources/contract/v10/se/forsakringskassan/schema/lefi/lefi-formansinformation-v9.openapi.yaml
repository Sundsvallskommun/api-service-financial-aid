        ersattningsniva:
          description: 'Beslutad ersättningsnivå. Bör innehålla något av värdena:


            - `NORMAL` (Förebyggande sjukpenning),

            - `FORTSATTNING` (Förebyggande sjukpenning på fortsättningsnivå),

            - `FLER_NORM` (Fler dagar med förebyggande sjukpenning på normalnivå)
