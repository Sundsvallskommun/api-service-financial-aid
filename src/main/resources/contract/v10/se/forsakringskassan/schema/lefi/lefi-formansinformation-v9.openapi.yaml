        bruttoforhojning:
          $ref: '#/components/schemas/LefiBelopp'
        pensionsgrundandeInkomst:
          $ref: '#/components/schemas/LefiBelopp'
      type: object
    LefiArbetsskadelivrantaEgenArende:
      description: Ett ärende om egenlivränta till följd av en arbetsskada.
      properties:
        startades:
