          type: array
      type: object
    LefiArbetsskadelivrantaEgenUppgifter:
      description: 'Uppgifter om egenlivränta till följd av en arbetsskada.


        Fältet `arbetsgivare` avser den avlidnes argbetsgivare vid skadetillfället,

        angiven som en sifferkod med beskrivning.


        Fältet `orsak` avser livräntetyp, vilken anges som en sifferkod med följande

        möjliga värden:


        - 0 = Okänd.

        - 1 = Arbetsoförmåga till följd av arbetssjukdom.

        - 2 = Arbetsoförmåga till följd av olycksfall i arbetet.

        - 3 = Arbetsoförmåga till följd av färdolycksfall.

        - 4 = Rehabilitering till följd av arbetssjukdom.

        - 5 = Rehabilitering till följd av olycksfall i arbetet.

        - 6 = Rehabilitering till följd av färdolycksfall.


        Fältet `arsinkomstInnanSkada` avser den skadades årsinkomst innan

        arbetsskadan.


        Faltet `arsinkomstEfterSkada` avser den skadades årsinkomst efter

        arbetsskadan.'
      properties:
