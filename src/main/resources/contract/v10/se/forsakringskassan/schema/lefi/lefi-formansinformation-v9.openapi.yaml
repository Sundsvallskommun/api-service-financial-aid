        följande möjliga värden:


        - 1 = OFORANDRAD.

        - 2 = BEVILJANDE.

        - 3 = ANDRING.

        - 5 = AVSLAG.

        - 6 = AVVISNING.

        - 7 = AVSKRIVNING.

        - 8 = UPPHORANDE.

        - 10 = MINSKNING.'
