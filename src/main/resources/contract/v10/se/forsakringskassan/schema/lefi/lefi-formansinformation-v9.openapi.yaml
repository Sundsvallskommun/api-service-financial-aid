openapi: 3.0.1
info:
  contact:
    email: kundcenterpartner@forsakringskassan.se
    name: ITUNE
    url: https://www.forsakringskassan.se/
  description: 'Tillhandahåller förmåns- och övrig information om försäkringstagare

    hos Försäkringskassan och Pensionsmyndigheten.


    Låter en behörig aktör ta del av data om enskilda personers

    försäkringsförmåner, vilka kan inkludera information om

    anspråk, beslut, utbetalningar, med mera.


    Då Försäkringskassan och Pensionsmyndigheten för närvarande använder

    sig av olika informationsmodeller har den utlämnade informationen

    olika struktur och använder olika begrepp beroende på vilken

    myndighet som lämnar ut den. Försäkringskassans information har den

    struktur den haft i tidigare versioner av LEFI Online, medan

    Pensionsmyndighetens information följer en ny struktur, vilken

    Försäkringskassans information är planerad att anpassas till i

    framtiden.


    Olika aktörer har rätt att ta del av olika delar av den förmedlade

    informationen, vilket betyder att få eller inga aktörer har rätt att

    ta del utav alla data som beskrivs i denna specifikation. Data en

    aktör inte har rätt till exkluderas från svaren till dess anrop utan

    notis eller varning. Vilka data som tillgängliggörs för en enskild

    aktör beror på vilka rättsliga grunder för utlämnande som appliceras

    av Försäkringskassan respektive Pensionsmyndigheten.'
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  title: 'LEFI extern: Förmånsinformation'
  version: 9.0.0
servers:
- description: Lokal server
  url: http://localhost
tags:
- description: Tillhandahåller förmåns- och övrig information om försäkringstagare.
  name: LefiExternFormansinformation
paths:
  /lefi-extern-formansinformation/v9/aktorer/{aktorsId}/formansinformation/fraga:
    post:
      description: 'Hämtar förmåns- och/eller övrig information om en förmånstagare
        identifierad via dess personnummer.


        Vissa förmånsgrupper och/eller typer av övrig information kan bara få sökträffar
        om en period finns specificerad i frågan.


        Anges ingen förmånsgrupp eller typ av övrig information i frågan underkänns
        hela anropet med statuskod 400. Är en period angiven i frågan som är längre
        än två år och det inte finns avtalsmässiga undantag för samtliga nämnda och
        berörda förmånsgrupper och/eller typer av övrig information underkänns också
        hela anropet med statuskod 400.


        Om en förmånsgrupp eller typ av övrig information specificeras i frågan som
        förfrågaren inte är behörig att ta del utav registreras den som en avvikelse
        och ingen associerad information förmedlas. I fallet av att ett delsystem
        hos en utlämnare som är ansvarigt för en informationstyp inte svarar registreras
        också det som en avvikelse. Avvikelser förhindrar inte att ej berörda informationstyper
        förmedlas som vanligt.


        Om en aktör som anroparen inte har rätt att representera, eller som är okänd,
        är specificerad i anropet underkänns det med statuskod 403.'
      operationId: hamtaFormansinformation
      parameters:
      - description: Identifierar aktören.
        example: 9255f428-4ba0-63ce-5407-e65d469fac0f
        explode: false
        in: path
        name: aktorsId
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            examples:
              Hämta sjukpenningsinformation:
                description: En begäran om att hämta person- och sjukpenningsinformation
                  för en förmånstagare.
                value:
                  personnummer: '197407029284'
                  period:
                    from: 2023-01-01
                    tom: 2024-01-01
                  formansinformation:
                  - FK:SJP
                  ovrigInformation:
                  - FK:GEPI
            schema:
              $ref: '#/components/schemas/LefiExternFormansinformationFraga'
        description: Beskrivning av den förmånsinformation och/eller övriga information
          som önskas.
      responses:
        '200':
          content:
            application/json:
              examples:
                Sjukpenningsinformation hämtad:
                  description: Svaret på en begäran om att hämta person- och sjukpenningsinformation
                    för en förmånstagare.
                  value:
                    utlamnare:
                    - utlamnare:
                        kod: FK
                        namn: Försäkringskassan
                      tillstand:
                        kod: OK
                        beskrivning: Tillgänglig
                    avvikelser: []
                    formansinformation:
                      sjukpenningarende:
                      - startades: 2023-04-05
                        aktivt: false
                        avslaget: false
                        beslut:
                        - fattades: 2023-06-30
                          definitivt: true
                          forman:
                            id: SJP
                            beskrivning: Sjukpenning
                          period:
                            fran: 2023-08-07
                            till: 2023-08-12
                          omfattning:
                            taljare: 1
                            namnare: 1
                          dagar: 6
                          karens: false
                          ersattning:
                            id: 101
                            beskrivning: Sjukpenning
                      generellPersoninformation:
                      - personnummer: '197407029284'
                        foddes: 1960-11-23
                        skyddad: false
                        adress:
                        - utdelningadress:
                          - Testgatan 7131 LGH 1433
                          postnummer: '51994'
                          postort: BJÖRKETORP
                          land:
                            kod: SE
                            namn: SVERIGE
                        civilstand:
                          id: 7
                          beskrivning: Änka/Änkeman
                        folkbokford:
                        - lan: '14'
                          kommun: '63'
                        medborgarskap:
                        - datum: 1993-03-26
                          land:
                            kod: SE
                            namn: SVERIGE
                        - land:
                            kod: 'NO'
                            namn: NORGE
              schema:
                $ref: '#/components/schemas/LefiExternFormansinformationSvar'
          description: Förmånsinformation och/eller övrig information hämtad.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LefiFelsvar'
          description: Felaktiga indata.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LefiFelsvar'
          description: Ej behörig.
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LefiFelsvar'
          description: Internt fel.
      tags:
      - LefiExternFormansinformation
  /lefi-extern-formansinformation/v9/aktorer/{aktorsId}/tillgangligaInformationstyper:
    get:
      description: 'Hämtar en sammanställning av de typer av information frågeställaren
        är behörig att hämta.




        Om en aktör som anroparen inte har rätt att representera, eller som är okänd,
        är specificerad i anropet underkänns det med statuskod 403.'
      operationId: hamtaTillgangligaInformationstyper
      parameters:
      - description: Identifierar aktören.
        example: 9255f428-4ba0-63ce-5407-e65d469fac0f
        explode: false
        in: path
        name: aktorsId
        required: true
        schema:
          type: string
        style: simple
      responses:
        '200':
          content:
            application/json:
              examples:
                Hämta tillgängliga informationstyper:
                  description: En begäran om att hämta en sammanställning av de typer
                    av information frågeställaren är behörig att ta del utav.
                  value:
                    utlamnare:
                    - utlamnare:
                        kod: FK
                        namn: Försäkringskassan
                      tillstand:
                        kod: OK
                        beskrivning: Tillgänglig
                    - utlamnare:
                        kod: PM
                        namn: Pensionsmyndigheten
                      tillstand:
                        kod: OK
                        beskrivning: Tillgänglig
                    formansinformation:
                    - kod: FK:ABB
                      beskrivning: Barnbidrag
                    - kod: FK:FP
                      beskrivning: Föräldrapenning
                    - kod: FK:SJP
                      beskrivning: Sjukpenning
                    - kod: FK:YL
                      beskrivning: Yrkesskadelivränta
                    ansprak:
                    - kod: PM:AP
                      beskrivning: Allmän pension
                    - kod: PM:EF
                      beskrivning: Efterlavandeförmåner
                    beslut:
                    - kod: PM:AP
                      beskrivning: Allmän pension
                    - kod: PM:EF
                      beskrivning: Efterlavandeförmåner
                    preliminaraUtbetalningar: []
                    utbetalningar:
                    - kod: FK:FP
                      beskrivning: Föräldrapenning
                    - kod: PM:AP
                      beskrivning: Allmän pension
                    ovrigInformation:
                    - kod: FK:GEPI
                      beskrivning: Generell personinformation
                    - kod: PM:PU
                      beskrivning: Pensionsunderlag
              schema:
                $ref: '#/components/schemas/LefiExternTillgangligaInformationstyper'
          description: Tillgängliga informationstyper hämtade.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LefiFelsvar'
          description: Ej behörig.
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LefiFelsvar'
          description: Internt fel.
      tags:
      - LefiExternFormansinformation
components:
  parameters:
    aktorsId:
      description: Identifierar aktören.
      example: 9255f428-4ba0-63ce-5407-e65d469fac0f
      explode: false
      in: path
      name: aktorsId
      required: true
      schema:
        type: string
      style: simple
  responses:
    400-BadRequest:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/LefiFelsvar'
      description: Felaktiga indata.
    403-Forbidden:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/LefiFelsvar'
      description: Ej behörig.
    500-InternalServerError:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/LefiFelsvar'
      description: Internt fel.
  schemas:
    LefiExternFormansinformationFraga:
      description: 'Beskriver vilken information som önskas om vilken försäkringstagare.


        Fältet `personnummer` identifierar den försäkringstagare om vilken information
        önskas.


        Fältet `period` avser den period under vilken den önskade informationen tillkommit,
        om tillämpligt.'
      properties:
        personnummer:
          description: Ett svenskt personnummer, bestående av 10 eller 12 siffror.
          pattern: ^([0-9]{2})?([0-9]{10})$
          type: string
        period:
          $ref: '#/components/schemas/LefiPeriod'
        formansinformation:
          description: 'De grupper av försäkringsförmåner, såsom _sjukpenning_ eller
            _rehabiliteringsersättning_, det önskas information om i svaret på frågan.


            Enbart Försäkringskassans information kan identifieras här.'
          items:
            $ref: '#/components/schemas/LefiFkFormanGruppKod'
          type: array
          uniqueItems: true
        ansprak:
          description: 'De grupper av försäkringsförmåner, såsom _allmän pension_
            eller _efterlevandeförmåner_, det önskas anspråksinformation om i svaret
            på frågan.


            Enbart Pensionsmyndighetens information kan identifieras här i denna version
            av LEFI.'
          items:
            $ref: '#/components/schemas/LefiPmFormanGruppKod'
          type: array
          uniqueItems: true
        beslut:
          description: 'De grupper av försäkringsförmåner, såsom _allmän pension_
            eller _efterlevandeförmåner_, det önskas beslutsinformation om i svaret
            på frågan.


            Enbart Pensionsmyndighetens information kan identifieras här i denna version
            av LEFI.'
          items:
            $ref: '#/components/schemas/LefiPmFormanGruppKod'
          type: array
          uniqueItems: true
        preliminaraUtbetalningar:
          description: 'De grupper av försäkringsförmåner, såsom _allmän pension_
            eller _efterlevandeförmåner_, det önskas preliminär utbetalningsinformation
            om i svaret på frågan.


            Även om både Försäkringskassans och Pensionsmyndighetens utbetalningstyper
            kan identifieras här presenteras de med olika format och på olika ställen
            i svaret på frågan.'
          items:
            $ref: '#/components/schemas/LefiExternFormanGruppKod'
          type: array
          uniqueItems: true
        utbetalningar:
          description: 'De grupper av försäkringsförmåner, såsom _allmän pension_
            eller _efterlevandeförmåner_, det önskas effektuerad utbetalningsinformation
            om i svaret på frågan.


            Även om både Försäkringskassans och Pensionsmyndighetens utbetalningstyper
            kan identifieras här presenteras de med olika format och på olika ställen
            i svaret på frågan.'
          items:
            $ref: '#/components/schemas/LefiExternFormanGruppKod'
          type: array
          uniqueItems: true
        ovrigInformation:
          description: 'Listar de typer av övrig information som önskas inkluderas
            i svaret på frågan.


            Även om både Försäkringskassans och Pensionsmyndighetens typer kan identifieras
            här presenteras de med olika format och på olika ställen i svaret på frågan.'
          items:
            $ref: '#/components/schemas/LefiExternOvrigInformationTypKod'
          type: array
          uniqueItems: true
      required:
      - period
      - personnummer
      type: object
    LefiExternFormansinformationAvvikelser:
      description: Beskriver vilka förmånsgrupper och typer av övrig information som
        inte kunnat hämtas på grund av olika typer av fel eller andra omständigheter.
        Dessa _avvikelser_ är associerade med samma informationsklasser och med samma
        förmånsgrupper respektive övriga informationstyper som de var i den hämtningsförfrågan
        som orsakade att det här objektet producerades.
      properties:
        formansinformation:
          description: Listar orsaker till att olika typer av förmånsinformation inte
            kunnat hämtas.
          items:
            $ref: '#/components/schemas/LefiFkAvvikelseFormanGrupp'
          type: array
        ansprak:
          description: Listar orsaker till att olika typer av anspråk inte kunnat
            hämtas.
          items:
            $ref: '#/components/schemas/LefiPmAvvikelseFormanGrupp'
          type: array
        beslut:
          description: Listar orsaker till att olika typer av beslut inte kunnat hämtas.
          items:
            $ref: '#/components/schemas/LefiPmAvvikelseFormanGrupp'
          type: array
        preliminaraUtbetalningar:
          description: Listar orsaker till att olika typer av preliminära utbetalningar
            inte kunnat hämtas.
          items:
            $ref: '#/components/schemas/LefiExternAvvikelseFormanGrupp'
          type: array
        utbetalningar:
          description: Listar orsaker till att olika typer av utbetalningar inte kunnat
            hämtas.
          items:
            $ref: '#/components/schemas/LefiExternAvvikelseFormanGrupp'
          type: array
        ovrigInformation:
          description: Listar orsaker till att olika typer av övrig information inte
            kunnat hämtas.
          items:
            $ref: '#/components/schemas/LefiExternAvvikelseOvrigInformationTyp'
          type: array
      type: object
    LefiExternFormansinformationSvar:
      description: 'En sammanställning utav hittad information som begärts om en förmånstagare.


        Fältet `utlamnare` listar de utlämnare av information som berörs av den besvarade
        hämtningsfrågan, och beskriver deras tillstånd. Enbart utlämnare vars tillstånd
        är `OK` har bidragit med information till svaret.


        Fältet `avvikelser` beskriver eventuella avvikelser som förhindrade att vissa
        av de begärda informationsmängderna förmedlades. Avvikelser skapas _inte_
        för de informationstyper vars utlämnare inte kunde leverera information.


        Fältet `formansinformation` innehåller hittad information som är strukturerad
        enligt Försäkringskassans informationsmodell. Övriga fält innehåller hittad
        information strukturerad enligt Pensionsmyndighetens datamodell.'
      properties:
        utlamnare:
          description: De informationsutlämnares tillstånd som berörs av den besvarade
            hämtningsfrågan.
          items:
            $ref: '#/components/schemas/LefiUtlamnareTillstand'
          type: array
        avvikelser:
          $ref: '#/components/schemas/LefiExternFormansinformationAvvikelser'
        formansinformation:
          $ref: '#/components/schemas/LefiFormansinformation'
        ansprak:
          description: Hittade förmånsanspråk, strukturerade enligt Pensionsmyndighetens
            informationsmodell.
          items:
            $ref: '#/components/schemas/LefiPmFormanAnsprak'
          type: array
        beslut:
          description: Hittade förmånsbeslut, strukturerade enligt Pensionsmyndighetens
            informationsmodell.
          items:
            $ref: '#/components/schemas/LefiPmFormanBeslut'
          type: array
        preliminaraUtbetalningar:
          description: 'Hittade preliminära utbetalningar, strukturerade enligt Pensionsmyndighetens
            informationsmodell.


            Då Försäkringskassans preliminära utbetalningar inte följer Pensionsmyndighetens
            informationsmodell presenteras de inte här, utan under fältet `formansinformation`.'
          items:
            $ref: '#/components/schemas/LefiPmFormanUtbetalning'
          type: array
        utbetalningar:
          description: 'Hittade effektuerade utbetalningar, strukturerade enligt Pensionsmyndighetens
            informationsmodell.


            Då Försäkringskassans utbetalningar inte följer Pensionsmyndighetens informationsmodell
            presenteras de inte här, utan under fältet `formansinformation`.'
          items:
            $ref: '#/components/schemas/LefiPmFormanUtbetalning'
          type: array
        ovrigInformation:
          description: 'Hittad övrig information, strukturerad enligt Pensionsmyndighetens
            informationsmodell.


            Då Försäkringskassans övriga information inte följer Pensionsmyndighetens
            informationsmodell presenteras den inte här, utan under fältet `formansinformation`.'
          items:
            $ref: '#/components/schemas/LefiPmOvrigInformation'
          type: array
      type: object
    LefiExternTillgangligaInformationstyper:
      description: Sammanställning av de förmånsgrupper och typer av övrig information
        en aktör har rätt att ta del utav.
      properties:
        formansinformation:
          description: De grupper av försäkringsförmåner, såsom _sjukpenning_ eller
            _rehabiliteringsersättning_, frågeställaren har rätt att hämta information
            och som är strukturerade enligt Försäkringskassans informationsmodell.
          items:
            $ref: '#/components/schemas/LefiFkFormanGrupp'
          type: array
          uniqueItems: true
        ansprak:
          description: De grupper av försäkringsförmåner, såsom _allmän pension_ eller
            _efterlevandeförmåner_, frågeställaren har behörighet att hämta anspråksinformation
            om.
          items:
            $ref: '#/components/schemas/LefiPmFormanGrupp'
          type: array
          uniqueItems: true
        beslut:
          description: De grupper av försäkringsförmåner, såsom _allmän pension_ eller
            _efterlevandeförmåner_, frågeställaren har behörighet att hämta beslutsinformation
            om.
          items:
            $ref: '#/components/schemas/LefiPmFormanGrupp'
          type: array
          uniqueItems: true
        preliminaraUtbetalningar:
          description: De grupper av försäkringsförmåner, såsom _allmän pension_ eller
            _rehabiliteringsersättning_, frågeställaren har behörighet att hämta preliminär
            utbetalningsinformation om.
          items:
            $ref: '#/components/schemas/LefiExternFormanGrupp'
          type: array
          uniqueItems: true
        utbetalningar:
          description: De grupper av försäkringsförmåner, såsom _allmän pension_ eller
            _rehabiliteringsersätting_, frågeställaren har behörighet att hämta effektuerad
            utbetalningsinformation om.
          items:
            $ref: '#/components/schemas/LefiExternFormanGrupp'
          type: array
          uniqueItems: true
        ovrigInformation:
          description: Listar de typer av övrig information frågeställaren har behörighet
            att be om.
          items:
            $ref: '#/components/schemas/LefiExternOvrigInformationTyp'
          type: array
      type: object
    LefiFelsvar:
      description: Beskriver ett fel som förhindrade utförandet av ett anrop.
      properties:
        meddelande:
          description: 'Beskrivning av felet på svenska.


            Denna beskrivning riktar sig till operatörer och bör inte visas direkt
            för

            slutanvändare. Beskrivningen får inte innehålla känsliga uppgifter, såsom

            person- eller organisationsnummer.'
          type: string
        timestamp:
          description: Den tid och datum då felet inträffade.
          format: date-time
          type: string
      type: object
    LefiPersonnummer:
      description: Ett svenskt personnummer, bestående av 10 eller 12 siffror.
      pattern: ^([0-9]{2})?([0-9]{10})$
      type: string
    LefiPeriod:
      description: Identifierar en serie intilliggande datum.
      properties:
        from:
          description: Det första datumet i den avsedda perioden.
          format: date
          type: string
        tom:
          description: 'Det sista datumet i den avsedda perioden.


            Detta kan vara samma datum som det första i perioden, vilket betyder att

            det bara är en dag som avses.'
          format: date
          type: string
      required:
      - from
      - tom
      type: object
    LefiFkFormanGruppKod:
      description: 'Identifierar en grupp av Försäkringskassans socialförsäkringsförmåner
        inom

        ramarna för LEFI version 9 och uppåt.'
      enum:
      - FK:ABB
      - FK:AP
      - FK:AS
      - FK:BOB
      - FK:BST
      - FK:BTI
      - FK:DPE
      - FK:EJO
      - FK:ET
      - FK:FP
      - FK:FSJP
      - FK:GP
      - FK:HE
      - FK:MABB
      - FK:MEK
      - FK:NP
      - FK:OMV
      - FK:PJOB
      - FK:PROG
      - FK:RBE
      - FK:SA
      - FK:SBP
      - FK:SJP
      - FK:TFP
      - FK:US
      - FK:VB
      - FK:YL
      type: string
    LefiPmFormanGruppKod:
      description: Identifierar en grupp av socialförsäkringsförmåner.
      enum:
      - PM:AP
      - PM:BTI
      - PM:EF
      type: string
    LefiExternFormanGruppKod:
      description: 'Identifierar en grupp av socialförsäkringsförmåner inom ramarna
        för LEFI

        version 9 och uppåt.


        Varje kod har ett prefix som anger vilken den utlämnande myndigheten är,

        enligt följande:


        - `FK:` Försäkringskassan.

        - `PM:` Pensionsmyndigheten.


        Vissa koder finns både hos Försäkringskassan och Pensionsmyndigheten. Detta

        eftersom viss information kan finnas tillgänglig från båda myndigheterna under

        en övergångsperiod. Inga garantier ges om att informationen alltid är samma

        från respektive myndighet.'
      enum:
      - FK:ABB
      - FK:AP
      - FK:AS
      - FK:BOB
      - FK:BST
      - FK:BTI
      - FK:DPE
      - FK:EJO
      - FK:ET
      - FK:FP
      - FK:FSJP
      - FK:GP
      - FK:HE
      - FK:MABB
      - FK:MEK
      - FK:NP
      - FK:OMV
      - FK:PJOB
      - FK:PROG
      - FK:RBE
      - FK:SA
      - FK:SBP
      - FK:SJP
      - FK:TFP
      - FK:US
      - FK:VB
      - FK:YL
      - PM:AP
      - PM:BTI
      - PM:EF
      type: string
    LefiExternOvrigInformationTypKod:
      description: 'Identifierar en typ av övrig information inom ramarna för LEFI
        version 9 och

        uppåt.


        Varje kod har ett prefix som anger vilken den utlämnande myndigheten är,

        enligt följande:


        - `FK:` Försäkringskassan.

        - `PM:` Pensionsmyndigheten.


        Vissa koder finns både hos Försäkringskassan och Pensionsmyndigheten. Detta

        eftersom viss information kan finnas tillgänglig från båda myndigheterna under

        en övergångsperiod. Inga garantier ges om att informationen alltid är samma

        från respektive myndighet.'
      enum:
      - FK:GEPI
      - FK:PANV
      - FK:SGI
      - FK:SKUP
      - FK:STAV
      - PM:LINT
      - PM:PBH
      - PM:PU
      type: string
