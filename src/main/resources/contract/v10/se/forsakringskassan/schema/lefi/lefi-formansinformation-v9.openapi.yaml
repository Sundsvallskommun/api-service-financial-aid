        beslutets periodicitet kan perioden vara redovisad med reducerad granularitet.
        I vissa fall redovisas också en så kallad "öppen period", vilken saknar slutdatum.


        Fältet `beslutstatus` avser beslutets status och anges som en bokstavskod
