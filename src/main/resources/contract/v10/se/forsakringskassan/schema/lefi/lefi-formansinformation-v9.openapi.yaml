            $ref: '#/components/schemas/LefiArbetsskadelivrantaBeslut'
          type: array
      type: object
    LefiArbetsskadelivrantaEfterlevandeUppgifter:
      description: 'Uppgifter om efterlevandelivränta till följd av en arbetsskada.


        Fältet `arbetsgivare` avser den avlidnes argbetsgivare vid skadetillfället,

        angiven som en sifferkod med beskrivning.


        Fältet `orsak` avser livräntetyp, vilken anges som en sifferkod med följande

        möjliga värden:


        - 0 = Okänd.

        - 1 = Änka/med änka jämställd kvinna med barn.

        - 2 = Änka/med änka jämställd kvinna utan barn.

        - 3 = Livränta till frånskild kvinna.

        - 4 = Barnlivränta.

        - 5 = Föraldralivränta.

        - 6 = Omställningslivränta.

        - 7 = Förlängd omställningslivränta.

        - 8 = Särskild efterlevandelivränta.

        - 9 = Barnlivränta.


        Fältet `avliden` avser den person som avlidit på grund av arbetsskadan.


        Fältet `arsinkomstInnanSkada` avser den avlidnes årsinkomst innan

        arbetsskadan.'
      properties:
        uppdaterades:
          description: Det datum dessa uppgifter senast uppdaterades.
          type: string
        arbetsgivare:
          $ref: '#/components/schemas/LefiSifferkod'
        skadetillfalle:
          description: Datumet skadan inträffade.
          type: string
        orsak:
          $ref: '#/components/schemas/LefiSifferkod'
        avliden:
          $ref: '#/components/schemas/LefiPerson'
        arsinkomstInnanSkada:
          $ref: '#/components/schemas/LefiBelopp'
      type: object
    LefiArbetsskadelivrantaBeslut:
      description: "Ett beslut taget i ett ärende om egen- eller efterlevandelivränta\
        \ till följd\nav arbetsskada.\n\nFälten `forman` och `delforman` innehåller\
        \ beslutets förmåns- och\ndelförmånskoder.\n\nFältet `periodicitet` anger\
        \ frekvensen med vilken den beslutade förmånen ska \nbetalas ut. Den anges\
        \ som en sifferkod med följande möjliga värden:\n\n- 0 = Ingen.\n- 1 = Månadsvis.\n\
        - 2 = Kvartalsvis.\n- 3 = Halvårsvis.\n- 4 = Årsvis.\n\nFältet `period` avser\
        \ perioden för vilken förmånen är beslutad. Beroende på\nbeslutets periodicitet\
        \ kan perioden vara redovisad med reducerad granularitet.\nI vissa fall redovisas\
        \ också en så kallad \"öppen period\", vilken saknar\nslutdatum.\n\nFältet\
        \ `ersattning` avser typen av ersättning ärendet gäller och anges som en\n\
        sifferkod med följande möjliga värden:\n\n- 0 = Vanlig.\n- 1 = Karens."
      properties:
        fattades:
          description: Det datum beslutet fattades eller beviljandet gjordes av myndigheten.
          type: string
        definitivt:
          description: 'Avser huruvida beslutet är definitivt eller ej.


            Definitiva beslut kan fortfarande överklagas. Ett definitivt beslut är

            aldrig att betrakta som provisoriskt eller preliminärt.'
          type: boolean
        forman:
          $ref: '#/components/schemas/LefiBokstavskod'
        delforman:
          $ref: '#/components/schemas/LefiBokstavskod'
        periodicitet:
          $ref: '#/components/schemas/LefiSifferkod'
        period:
          $ref: '#/components/schemas/LefiFranTill'
        beslutatBruttobelopp:
          $ref: '#/components/schemas/LefiBelopp'
        underlag:
          $ref: '#/components/schemas/LefiArbetsskadelivrantaUnderlag'
        samordnatBruttobelopp:
          $ref: '#/components/schemas/LefiBelopp'
        ersattning:
          $ref: '#/components/schemas/LefiSifferkod'
      type: object
    LefiArbetsskadelivrantaUnderlag:
      description: 'Ett underlag till ett beslut taget i ett ärende om egen- eller

        efterlevandelivränta till följd av arbetsskada.'
      properties:
        faktor:
          description: 'Aktuell livräntefaktor då beslutet fattades.


            Anges som ett decimaltal med upp till fem decimaler.'
          format: double
          type: number
        samordningsandel:
