      type: object
    LefiSjukOchAktivitetsersattningUppgifter:
      description: Uppgifter i ett ärende om sjuk- och aktivitetsersättning.
      properties:
        forsakringstid:
          description: 'Förmånstagarens ungefärliga samlade försäkringstid vid

            ansökningstillfället.


            Faktisk och framtida svensk försäkringstid i svenska ärenden. Beskrivs

            normalt i omfattning av 40 delar. Anges ej om uppgifter om

            Garantiersättning (GSA) förekommer i objektet.'
          items:
            $ref: '#/components/schemas/LefiOmfattning'
          maxItems: 1
          minItems: 0
          type: array
        forsakringstidGsaAr:
          description: 'Försäkringstid för Garantiersättning (GSA) i år.


            Gäller faktisk och framtida svensk försäkringstid i EU/EES-ärenden.'
          items:
            type: integer
          maxItems: 1
          minItems: 0
          type: array
        forsakringstidGsaManad:
          description: 'Försäkringstid för Garantiersättning (GSA) i månader.


            Gäller faktisk och framtida svensk försäkringstid i EU/EES-ärenden.'
          items:
            type: integer
          maxItems: 1
          minItems: 0
          type: array
        forsakringstidGsaDag:
          description: 'Försäkringstid för Garantiersättning (GSA) i dagar.


            Gäller faktisk och framtida svensk försäkringstid i EU/EES-ärenden.'
          items:
            type: integer
          maxItems: 1
          minItems: 0
          type: array
      type: object
    LefiSjukOchAktivitetsersattningBeslut:
      description: 'Ett beslut i ett ärende om sjuk- och aktivitetsersättning.


        Fälten `forman` och `delforman` innehåller beslutets förmåns- och

        delförmånskoder.


        Fältet `periodicitet` anger frekvensen med vilken den beslutade förmånen ska

        betalas ut. Den anges som en sifferkod med följande möjliga värden:


        - 0 = Ingen.

        - 1 = Månadsvis.

        - 2 = Kvartalsvis.

        - 3 = Halvårsvis.

        - 4 = Årsvis.


        Fältet `period` avser perioden för vilken förmånen är beslutad. Beroende på

        beslutets periodicitet kan perioden vara redovisad med reducerad granularitet.

        I vissa fall redovisas också en så kallad "öppen period", vilken saknar

        slutdatum.


        Fältet `omfattning` avser förmånens omfattning under perioden den betalas
        ut.'
      properties:
        fattades:
          description: Det datum beslutet fattades eller beviljandet gjordes av myndigheten.
          type: string
        definitivt:
          description: 'Avser huruvida beslutet är definitivt eller ej.


            Definitiva beslut kan fortfarande överklagas. Ett definitivt beslut är

