            Anges som sifferkoder, vilka har följande möjliga värden:


            - 1 = Änka/änkling.

            - 2 = Barn, ej över 16/19 år.

            - 3 = Barn, över 16/19 år.

            - 4 = Förälder.

            - 5 = Frånskild änka.'
          items:
            $ref: '#/components/schemas/LefiSifferkod'
          minItems: 1
          type: array
        avliden:
          $ref: '#/components/schemas/LefiPerson'
      type: object
    LefiYrkesskadelivrantaBeslut:
      description: 'Ett beslut i ett ärende om egen- eller efterlevandelivränta.


        Fälten `forman` och `delforman` innehåller beslutets förmåns- och

        delförmånskoder.


        Fältet `periodicitet` anger frekvensen med vilken den beslutade förmånen ska

        betalas ut. Den anges som en sifferkod med följande möjliga värden:


        - 0 = Ingen.

        - 1 = Månadsvis.

        - 2 = Kvartalsvis.

        - 3 = Halvårsvis.

        - 4 = Årsvis.


        Fältet `period` avser perioden för vilken förmånen är beslutad. Beroende på

        beslutets periodicitet kan perioden vara redovisad med reducerad granularitet.

        I vissa fall redovisas också en så kallad "öppen period", vilken saknar

        slutdatum.


        Fältet `ersattning` avser typ av ersättning och anges som en sifferkod med

        följande möjliga värden:


        - 1 = Skattefri.'
      properties:
        fattades:
          description: Det datum beslutet fattades eller beviljandet gjordes av myndigheten.
          type: string
        definitivt:
          description: 'Avser huruvida beslutet är definitivt eller ej.


            Definitiva beslut kan fortfarande överklagas. Ett definitivt beslut är

            aldrig att betrakta som provisoriskt eller preliminärt.'
          type: boolean
        forman:
          $ref: '#/components/schemas/LefiBokstavskod'
        delforman:
          $ref: '#/components/schemas/LefiBokstavskod'
        periodicitet:
          $ref: '#/components/schemas/LefiSifferkod'
        period:
          $ref: '#/components/schemas/LefiFranTill'
        beslutatBruttobelopp:
          $ref: '#/components/schemas/LefiBelopp'
        underlag:
          $ref: '#/components/schemas/LefiYrkesskadelivrantaUnderlag'
        ersattning:
          $ref: '#/components/schemas/LefiSifferkod'
      type: object
    LefiYrkesskadelivrantaUnderlag:
      description: Fältet `faktor` avser aktuell livräntefaktor då beslutet fattades.
      properties:
        faktor:
          $ref: '#/components/schemas/LefiOmfattning'
      type: object
    LefiYrkesskadelivrantaEgenArende:
      description: Ett ärende om egenlivränta till följd av yrkesskada.
      properties:
        startades:
          description: 'Det datum då ärendet startades, vilket normalt är när en ansökan
            ankom

            till myndigheten.'
          type: string
        aktivt:
          description: Huruvida ärendet är aktivt.
          type: boolean
        avslaget:
          description: Huruvida ärendet är avslaget.
          type: boolean
        grunduppgifter:
          $ref: '#/components/schemas/LefiYrkesskadelivrantaEgenUppgifter'
        beslut:
          description: 'Beslut fattade i ärendet.


            Dessa beslut avser enkom beslutad ersättning för en period. Beslut

            gällande avslag/indrag finns inte med här.'
          items:
            $ref: '#/components/schemas/LefiYrkesskadelivrantaBeslut'
          type: array
      type: object
    LefiYrkesskadelivrantaEgenUppgifter:
      description: Uppgifter i ett ärende om egenlivränta till följd av yrkesskada.
      properties:
        arbetsgivare:
          description: 'Den arbetsgivare som är kostnadsbärare för självrisken vid

            skadetillfället.


            Anges som en sifferkod med ett av följande möjliga värden:


            - 10 = Arbetsskador i allmänhet.

            - 11 = Utbildning, övrig (SFS 1977.284 2P).

            - 12 = Statlig Arbetskadeersättning (ej affärsverk).

            - 13 = Krigsskadeersättning till sjömän (SFS 1977.265).

            - 14 = Civilförsvarslagen (SFS 1977.265).

            - 15 = Räddningstjänst (SFS 1977.265).

            - 16 = Kriminalvården (SFS 1977.265).

            - 17 = Statligt anordnad utbildning (SFS 1977.284).

            - 18 = FN-tjänst.

            - 19 = Värnpliktslagen (SFS 1977.265).

            - 20 = Frivilliga värnpliktiga(SFS 1977.284 6P).

            - 50 = Statens Järnvägar.

            - 51 = Posten.

            - 52 = Telia.

            - 53 = Banverket.

            - 54 = Vattenfall.

            - 55 = Sveaskog (utgått 2008-07-01).

            - 56 = Affärsverksfonden (Celsius, Sveaskog, mm.).

            - 57 = Luftfartsverket.

            - 59 = Sjöfartsverket.

            - 60 = Stiftsnämnden.

            - 82 = Swebus AB.

            - 83 = SweFerry AB.

            - 84 = EuroMaint.'
          items:
            $ref: '#/components/schemas/LefiSifferkod'
          maxItems: 1
          minItems: 0
          type: array
        skadetillfalle:
          description: Datumet skadan inträffade.
          type: string
        orsak:
          description: 'Identiferar orsaker till ersättning.


            Anges som sifferkoder med följande möjliga värden:


            - 1 = Olycksfall.

            - 2 = Yrkessjukdom.

            - 3 = Silikos.

            - 4 = Militärskola.

            - 5 = Silikostillägg.'
          items:
            $ref: '#/components/schemas/LefiSifferkod'
          minItems: 1
          type: array
      type: object
    LefiPmFormanAnsprak:
      description: 'Beskriver ett förmånsanspråk som kan göras hos Pensionsmyndigheten.


        Fältet `formansgrupp` identifierar den förmånsgrupp detta anspråk tillhör.


        Fältet `yrkadPeriod` anger den datumperiod som yrkats som grund till förmånen
        som anspråket avser.'
      properties:
        ansprakid:
          description: 'Identifierar detta anspråk.


            Detta id bör användas när relevant att identifiera ett specifikt anspråk
            vid kontakt med Pensionsmyndigheten.'
          type: string
        ankomstdatum:
          description: Det datum detta anspråk togs emot av Pensionsmyndigheten.
          format: date
          type: string
        formansgrupp:
          $ref: '#/components/schemas/LefiPmFormanGrupp'
        yrkadPeriod:
          $ref: '#/components/schemas/LefiPeriodMedValfrittTom'
      type: object
    LefiPmFormanGrupp:
      description: Identifierar och beskriver en grupp av socialförsäkringsförmåner.
      properties:
        kod:
          $ref: '#/components/schemas/LefiPmFormanGruppKod'
        beskrivning:
          description: Kort beskrivning av förmånsgruppen som avses.
          type: string
      required:
      - beskrivning
      - kod
      type: object
    LefiPmFormanBeslut:
      description: 'Beskriver ett beslut som kan göras av Pensionsmyndigheten om ett
        förmånsanspråk.


        Fältet `formansgrupp` identifierar den förmånsgrupp detta beslut tillhör.'
      properties:
        beslutsid:
          description: 'Identifierar detta beslut.


            Detta id bör användas när relevant att identifiera ett specifikt beslut
            vid kontakt med Pensionsmyndigheten.'
          type: string
        beslutsdatum:
          description: Det datum detta beslut togs emot av Pensionsmyndigheten.
          format: date
          type: string
        formansgrupp:
          $ref: '#/components/schemas/LefiPmFormanGrupp'
        beslutsstatus:
          $ref: '#/components/schemas/LefiPmFormanBeslutStatus'
        beslutsutfall:
          $ref: '#/components/schemas/LefiPmFormanBeslutUtfall'
        beslutadErsattning:
          description: Beskriver de ersättningar som är del av beslutet, om några.
          items:
            $ref: '#/components/schemas/LefiPmFormanBeslutadErsattning'
          type: array
        tillagg:
          $ref: '#/components/schemas/LefiPmFormanBeslutTillagg'
      type: object
    LefiPmFormanBeslutStatus:
      description: Identifierar och beskriver statusen hos ett beslut.
      properties:
        kod:
          $ref: '#/components/schemas/LefiPmFormanBeslutStatusKod'
        beskrivning:
          description: Kort beskrivning av statusen som avses.
          type: string
      required:
      - beskrivning
      - kod
      type: object
    LefiPmFormanBeslutStatusKod:
      description: Identifierar en status ett beslut kan ha.
      enum:
      - INTERIMISTISKT
      - PRELIMINART
      - SLUTLIGT
      type: string
    LefiPmFormanBeslutUtfall:
      description: Identifierar och beskriver utfallet hos ett beslut.
      properties:
        kod:
          $ref: '#/components/schemas/LefiPmFormanBeslutUtfallKod'
        beskrivning:
          description: Kort beskrivning av utfallet som avses.
          type: string
      required:
      - beskrivning
      - kod
      type: object
    LefiPmFormanBeslutUtfallKod:
      description: Identifierar ett utfall ett beslut kan ha.
      enum:
      - BIFALL
      - AVSLAG
      type: string
    LefiPmFormanBeslutadErsattning:
      description: 'Beskriver en ersättning som är del av ett förmånsbeslut.


        Fältet `period` avser perioden som avses av ersättningsbeslutet, om relevant.
        Perioden beskriver alltså den serie datum som ligger till grund för beslutet
        om utbetalning. Notera att detta inte nödvändigtvis är en indikation på när
        ersättningen kommer att betalas ut.'
      properties:
        beslutatBelopp:
          $ref: '#/components/schemas/LefiPmFormanBeslutatBelopp'
        period:
          $ref: '#/components/schemas/LefiPeriodMedValfrittTom'
        ersattningstyp:
          $ref: '#/components/schemas/LefiPmFormanBeslutadErsattningTyp'
        omfattning:
          description: 'Den omfattning som avses av ersättningsbeslutet, om relevant.


            Om angiven beskriver omfattningen hur stor andel av angiven period, eller
            annan tidsrymd eller beslutsmängd, som ligger till grund för beslutet.
            Omfattningen anges som ett nummer mellan 0 och 1 med minst 3 decimalers
            precision.'
          maximum: 1.0
          minimum: 0.0
          type: number
        underlag:
          $ref: '#/components/schemas/LefiPmFormanBeslutadErsattningUnderlag'
      type: object
    LefiPmFormanBeslutatBelopp:
      description: 'Ett beslutat belopp.


        Fältet `beloppsfrekvens` avser den tidsrymd som beloppet är beslutat för och
        avgör hur mycket detta belopp bidrar till bruttobeloppet i det förmånsbeslut
        som det är del utav.'
      properties:
