      - KVARTAL
      - MANAD
      - VECKA
      - DAG
      - ENGANGS
      type: string
    LefiPmFormanBeslutadErsattningTyp:
      description: Identifierar och beskriver en typ av ersättning.
      properties:
        kod:
          $ref: '#/components/schemas/LefiPmFormanBeslutadErsattningTypKod'
        beskrivning:
