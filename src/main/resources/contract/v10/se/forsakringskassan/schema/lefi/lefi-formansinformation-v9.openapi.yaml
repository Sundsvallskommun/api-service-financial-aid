    LefiTillfalligForaldrapenningDag:
      description: 'En kalenderdag som bedömts i ett ärende om tillfällig föräldrapenning.


        Fältet `bedomtBelopp` avser belopp bedömt av händläggare.


        Fältet `inkomsttyp` avser typ av inkomst och anges som en sifferkod med

        följande möjliga värden:


        - 0 = Inkomsttyp okänd.

        - 1 = A-inkomst.

        - 2 = B-inkomst.


        Notera att både A- och B-inkomst kan förekomma samtidigt, och blir då två

        olika dagar med samma datum.


        Fältet `berakningssatt` avser beräkningssätt och anges som en sifferkod med

        följande möjliga värden:


        - 0 = Okänt beräkningssätt.

        - 1 = Timberäknad.

        - 2 = Dagberäknad.

        - 3 = Kalenderdagsberäknad.'
      properties:
        dag:
          description: Kalenderdagen som avses.
          type: string
        bedomtBelopp:
          $ref: '#/components/schemas/LefiBelopp'
        inkomsttyp:
          $ref: '#/components/schemas/LefiSifferkod'
        berakningssatt:
