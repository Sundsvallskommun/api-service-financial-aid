        Divisionen av dessa två nummer bör i regel producera någon utav fraktionerna:

        0.25, 0.50, 0.60, 0.75, 0.80, 0.90 eller 1.00.


        Om endera eller båda av dessa nummer inte är satta kan det betraktas som om

