    LefiPmFormanBeslutTillagg:
      description: 'Förmånsspecifika tillägg till ett förmånsbeslut.


        Vilket av dessa tillägg som är angivet beror på beslutets förmånsgrupp, enligt
        följande:


        - _Allmän pension_ (`PM:AP`) -> `allmanpension`

        - _Bostads- och inkomststöd_ (`PM:BTI`) -> `bostadsInkomststod`

        - _Efterlavandeförmåner_ (`PM:EF`) -> `efterlevandeformaner`'
      properties:
        allmanpension:
          $ref: '#/components/schemas/LefiPmFormanBeslutTillaggAllmanpension'
        bostadsInkomststod:
          $ref: '#/components/schemas/LefiPmFormanBeslutTillaggBostadsInkomststod'
        efterlevandeformaner:
          $ref: '#/components/schemas/LefiPmFormanBeslutTillaggEfterlevandeformaner'
      type: object
    LefiPmFormanBeslutTillaggAllmanpension:
      description: Tilläggsinformation till beslut om allmän pension (AP).
      properties:
        samordningMedPensionFranAnnatLand:
          type: boolean
        anvantCivilstand:
          $ref: '#/components/schemas/LefiPmCivilstand'
      type: object
    LefiPmCivilstand:
      description: Identifierar och beskriver ett civilstånd.
      properties:
        kod:
          $ref: '#/components/schemas/LefiPmCivilstandKod'
        beskrivning:
          description: Kort beskrivning av civilståndet som avses.
          type: string
      required:
      - beskrivning
      - kod
      type: object
    LefiPmCivilstandKod:
      description: Identifierar ett civilstånd.
      enum:
      - OGIFT
      - GIFT
      type: string
    LefiPmFormanBeslutTillaggBostadsInkomststod:
      description: Tilläggsinformation till beslut om bostads- och inkomststöd (BTI).
      properties:
        berakningsunderlag:
          $ref: '#/components/schemas/LefiPmFormanBeslutTillaggBostadsInkomststodBerakningsunderlag'
      type: object
    LefiPmFormanBeslutTillaggBostadsInkomststodBerakningsunderlag:
      description: Beräkningsunderlag till beslut om bostads- och inkomststöd (BTI).
      properties:
        bostadskostnadBrutto:
          type: integer
        bostadskostnadNettoBt:
          type: integer
        bostadskostnaddNettoAfs:
          type: integer
        medsokande:
          description: Ett svenskt personnummer, bestående av 10 eller 12 siffror.
          pattern: ^([0-9]{2})?([0-9]{10})$
          type: string
      type: object
    LefiPmFormanBeslutTillaggEfterlevandeformaner:
      description: Tilläggsinformation till beslut om efterlevandeförmåner (EF).
      properties:
        avlidna:
          items:
            $ref: '#/components/schemas/LefiPmFormanBeslutTillaggEfterlevandeformanerAvliden'
          maxItems: 2
          minItems: 0
          type: array
        ovrigaBerattigadeEfterlevande:
          items:
            $ref: '#/components/schemas/LefiPmFormanBeslutTillaggEfterlevandeFormanderOvrigBerattigadEfterlevande'
          type: array
      type: object
    LefiPmFormanBeslutTillaggEfterlevandeformanerAvliden:
      properties:
        person:
          description: Ett svenskt personnummer, bestående av 10 eller 12 siffror.
          pattern: ^([0-9]{2})?([0-9]{10})$
          type: string
        dodsfallsdatum:
          description: Anges enligt ett utav formaten `yyyy` (år), `yyyy-MM` (år och
            månad),`yyyy-MM-dd` (år, månad och dag) och `Datum saknas`. Det sista
            fallet innebär att personen i fråga är registrerad som avliden men att
            inget känt dödsdatum finns.
          pattern: ^(:?(\d{4})(-(:?0[1-9]|1[0-2])(-(:?0[1-9]|[12]\d|3[01]))?)?)|Datum
            saknas$
          type: string
        fodelsedatum:
          format: date
          type: string
      type: object
    LefiPmFormanBeslutTillaggEfterlevandeFormanderOvrigBerattigadEfterlevande:
      properties:
        person:
          description: Ett svenskt personnummer, bestående av 10 eller 12 siffror.
          pattern: ^([0-9]{2})?([0-9]{10})$
          type: string
      type: object
    LefiPmFormanUtbetalning:
      description: 'Beskriver en förmånsutbetalning som gjorts eller planeras göras
        av Pensionsmyndigheten.


        I vissa fall avser enskilda utbetalningar flera förmåner. För att avgöra vilka
        förmåner som avses måste fältet `formansgrupp` konsulteras, vilket alltså
        hittas i de individuella raderna i fältet `utbetalningsrader`.


        Fältet `utbetalningsperiod` avser de datum som ligger till grund för utbetalningen.
        De är inte en indikation på när utbetalningen sker.'
      properties:
        utbetalningsdatum:
          description: Det datum då utbetalningen har eller planeras effektueras.
          format: date
          type: string
        utbetalningsperiod:
          $ref: '#/components/schemas/LefiPeriod'
        bruttobelopp:
          description: Bruttobeloppet som ligger till grund för det utbetalade nettobeloppet.
          type: integer
        nettobelopp:
          description: Det belopp som faktiskt betalas ut.
          type: integer
        avdrag:
          description: Beskriver de olika belopp som utgör skillnaden mellan utbetalningens
            brutto- och nettobelopp.
          items:
            $ref: '#/components/schemas/LefiPmFormanUtbetalningAvdrag'
          type: array
        utbetalningsrader:
          description: Beskriver de olika belopp som utgör utbetalningens bruttobelopp.
          items:
            $ref: '#/components/schemas/LefiPmFormanUtbetalningRad'
          type: array
      type: object
    LefiPmFormanUtbetalningAvdrag:
      description: Beskriver ett avdrag som görs från en förmånsutbetalnings bruttobelopp.
      properties:
        belopp:
          description: Det avdragna beloppet, i SEK.
          type: integer
        avdragstyp:
          $ref: '#/components/schemas/LefiPmFormanUtbetalningAvdragTyp'
      type: object
    LefiPmFormanUtbetalningAvdragTyp:
      description: Identifierar och beskriver en typ av avdrag som görs från bruttobeloppet
        av en utbetalning.
      properties:
        kod:
          $ref: '#/components/schemas/LefiPmFormanUtbetalningAvdragTypKod'
        beskrivning:
          description: Kort beskrivning av avdragstypen som avses.
          type: string
      required:
      - beskrivning
      - kod
      type: object
    LefiPmFormanUtbetalningAvdragTypKod:
      description: Identifierar en typ av avdrag.
      enum:
      - PM:AVDRAGKANTRA
      - PM:AVDRAGOVRIGT
      - PM:INSTITUTION
      - PM:KVIKAN
      - PM:KVIOVR
      - PM:PS
      - PM:PST
      - PM:SOCAVDRAG
      - PM:SS
      - PM:SST
      - PM:UTLFORDRAN
      - PM:UTMATNING
      - PM:UTMHELA
      - PM:UTMTV
      type: string
    LefiPmFormanUtbetalningRad:
      description: Redovisar en del av ett större utbetalningsbelopp.
      properties:
        formansgrupp:
          $ref: '#/components/schemas/LefiPmFormanGrupp'
        belopp:
          description: Delbeloppet i SEK redovisat av denna utbetalningsrad.
          type: integer
        utbetalningsforman:
          $ref: '#/components/schemas/LefiPmUtbetalningForman'
        beloppstyp:
          $ref: '#/components/schemas/LefiPmFormanUtbetalningBeloppTyp'
      type: object
    LefiPmUtbetalningForman:
      description: Identifierar och beskriver en typ av förmånsutbetalning.
      properties:
        kod:
          $ref: '#/components/schemas/LefiPmUtbetalningFormanKod'
        beskrivning:
          description: Kort beskrivning av utbetalningförmånen som avses.
          type: string
      required:
      - beskrivning
      - kod
      type: object
    LefiPmUtbetalningFormanKod:
      description: Identifierar en av Pensionsmyndighetens utbetalningsförmåner.
      enum:
      - PM:AL
      - PM:AP37
      - PM:AP38
      - PM:BTP
      - PM:EP
      - PM:PREP
      type: string
    LefiPmFormanUtbetalningBeloppTyp:
      description: Identifierar och beskriver en typ av utbetalningsbart belopp.
      properties:
        kod:
          $ref: '#/components/schemas/LefiPmFormanUtbetalningBeloppTypKod'
        beskrivning:
          description: Kort beskrivning av beloppstypen som avses.
          type: string
      required:
      - beskrivning
      - kod
      type: object
    LefiPmFormanUtbetalningBeloppTypKod:
      description: Identifierar en typ av utbetalningsbart belopp.
      enum:
      - PM:AFS
      - PM:AL1
      - PM:AL2
      - PM:AL3
      - PM:AL4
      - PM:AL5
      - PM:AL6
      - PM:AL7
      - PM:AL8
      - PM:AL9
      - PM:ALB
      - PM:ANKEP
      - PM:ANKEPGARP
      - PM:BP
      - PM:BPFRI
      - PM:BPSKP
      - PM:BTP
      - PM:BTPSA
      - PM:ELSTOD
      - PM:FOP
      - PM:FOPGARP
      - PM:GARP
      - PM:IP
      - PM:IPT
      - PM:OP
      - PM:OPGARP
      - PM:PFE
      - PM:PFO
      - PM:SBTP
      - PM:SBTPSA
      - PM:SEP
      - PM:SEPGARP
      - PM:TP
      type: string
    LefiPmOvrigInformation:
      description: 'Övrig information som tillhandahålls av Pensionsmyndigheten.


        Vilken av dessa typer av övrig information som är angivet beror på värdet
        i fältet `informationstyp`, enligt följande:


        - _Levnadsintyg_ (`PM:LINT`) -> `levnadsintyg`

        - _Pensionsbehållning_ (`PM:PBH`) -> `pensionsbehallning`

        - _Pensionsunderlag_ (`PM:PU`) -> `pensionsunderlag`'
      properties:
        informationstyp:
          $ref: '#/components/schemas/LefiPmOvrigInformationTyp'
        levnadsintyg:
          $ref: '#/components/schemas/LefiPmLevnadsintyg'
        pensionsbehallning:
          $ref: '#/components/schemas/LefiPmPensionBehallning'
        pensionsunderlag:
          $ref: '#/components/schemas/LefiPmPensionUnderlag'
      type: object
    LefiPmOvrigInformationTyp:
      description: Identifierar och beskriver en typ av övrig information.
      properties:
        kod:
          $ref: '#/components/schemas/LefiPmOvrigInformationTypKod'
        beskrivning:
          description: Kort beskrivning av informationstypen som avses.
          type: string
      required:
      - beskrivning
      - kod
      type: object
    LefiPmOvrigInformationTypKod:
      description: Identifierar en typ av övrig information.
      enum:
      - PM:LINT
      - PM:PBH
      - PM:PU
      type: string
    LefiPmLevnadsintyg:
      description: Information om ett levnadsintyg.
      properties:
        senastUppdaterad:
          format: date
          type: string
        levnadsintygsstatus:
          $ref: '#/components/schemas/LefiPmLevnadsintygStatus'
      type: object
    LefiPmLevnadsintygStatus:
      description: Identifierar och beskriver en typ av status ett levnadsintyg kan
        ha.
      properties:
        kod:
          $ref: '#/components/schemas/LefiPmLevnadsintygStatusKod'
        beskrivning:
          description: Kort beskrivning av statusen som avses.
          type: string
      required:
      - beskrivning
      - kod
      type: object
    LefiPmLevnadsintygStatusKod:
      description: Identifierar en typ av status ett levnadsintyg kan ha.
      enum:
      - 0
      - 1
      - 2
      - 3
      - 4
      - 5
      - 7
      - 8
      - 9
      - 10
      - 20
      - 21
      - 22
      - 23
      - 24
      - 25
      type: integer
      x-enum-varnames:
      - STATUS_0
      - STATUS_1
      - STATUS_2
      - STATUS_3
      - STATUS_4
      - STATUS_5
      - STATUS_7
      - STATUS_8
      - STATUS_9
      - STATUS_10
      - STATUS_20
      - STATUS_21
      - STATUS_22
      - STATUS_23
      - STATUS_24
      - STATUS_25
    LefiPmPensionBehallning:
      properties:
        pensionskonton:
          items:
            $ref: '#/components/schemas/LefiPmPensionKonto'
          minLength: 1
          type: array
      type: object
    LefiPmPensionKonto:
      properties:
        kontotyp:
          $ref: '#/components/schemas/LefiPmPensionKontoTyp'
        kontovarden:
          items:
            $ref: '#/components/schemas/LefiPmPensionKontoVarde'
          minLength: 1
          type: array
      type: object
    LefiPmPensionKontoTyp:
      description: Identifierar och beskriver en typ av pensionskonto.
      properties:
        kod:
          $ref: '#/components/schemas/LefiPmPensionKontoTypKod'
        beskrivning:
          description: Kort beskrivning av kontotypen som avses.
          type: string
      required:
      - beskrivning
      - kod
      type: object
    LefiPmPensionKontoTypKod:
      description: Identifierar en typ av pensionskonto.
      enum:
      - IP
      - PREP
      type: string
    LefiPmPensionKontoVarde:
      properties:
        varde:
          type: integer
        gallerFrom:
          pattern: ^[0-9]{4}-(0[1-9]|1[0-2])$
          type: string
        faststallelsear:
          pattern: ^[0-9]{4}$
          type: string
        kontohandelse:
          $ref: '#/components/schemas/LefiPmPensionKontoHandelse'
      type: object
    LefiPmPensionKontoHandelse:
      description: En händelse relaterad till ett pensionskonto.
      properties:
        kontohandelsetyp:
          $ref: '#/components/schemas/LefiPmPensionKontoHandelseTyp'
        kontohandelsetidpunkt:
          description: Tidpunkten för kontohändelsen.
          format: date-time
          type: string
        kontotransaktioner:
          description: Transaktionerna, om några, som utgör kontohändelsen.
          items:
            $ref: '#/components/schemas/LefiPmPensionKontoTransaktion'
          minLength: 1
          type: array
      type: object
    LefiPmPensionKontoHandelseTyp:
      description: Identifierar och beskriver en typ av pensionskontohändelse.
      properties:
        kod:
          $ref: '#/components/schemas/LefiPmPensionKontoHandelseTypKod'
        beskrivning:
          description: Kort beskrivning av händelsetypen som avses.
          type: string
      required:
      - beskrivning
      - kod
      type: object
    LefiPmPensionKontoHandelseTypKod:
      description: Identifierar en typ av pensionskontohändelse.
      enum:
      - ANDRAD_PENSIONSRATT
      - ARSOMRAKNING
      - DODSFALL
      - EG_OVERFORING
      - FORVARVSVILLKORET_INTE_UPPFYLLT
      - FORVARVSVILLKORET_UPPFYLLT
      - NYTT_ANDRAT_PENSIONSUTTAG
      - RIKTALDER_UPPNADD
      type: string
    LefiPmPensionKontoTransaktion:
      description: 'Beskriver en transaktion till eller från ett pensionskonto.


        Huruvida transaktionens belopp satts in eller tagits ut beror på kontotransaktionstypen
        som avses av transaktionen.'
      properties:
        kontotransaktionstyp:
          $ref: '#/components/schemas/LefiPmPensionKontoTransaktionTyp'
        belopp:
          description: Belopp i SEK som sätts in eller tagits ut från pensionskontot
            i fråga.
          type: integer
      type: object
    LefiPmPensionKontoTransaktionTyp:
      description: Identifierar och beskriver en typ av pensionskontotransaktion.
      properties:
        kod:
          $ref: '#/components/schemas/LefiPmPensionKontoTransaktionTypKod'
        beskrivning:
          description: Kort beskrivning av transaktionstypen som avses.
          type: string
      required:
      - beskrivning
      - kod
      type: object
    LefiPmPensionKontoTransaktionTypKod:
      description: Identifierar en typ av pensionskontotransaktion.
      enum:
      - ARVSVINST
      - FORVALTNINGSKOSTNAD
      - PENSIONSRATT
      - BALANSERAD_PENSIONSRATT
      - INDEXERING
      - UTTAGEN_PENSIONSBEHALLNING
      - ATERLAGD_PENSIONSBEHALLNING
      type: string
    LefiPmPensionUnderlag:
      properties:
        intjanandear:
          items:
            $ref: '#/components/schemas/LefiPmPensionUnderlagIntjanandeAr'
          type: array
      type: object
    LefiPmPensionUnderlagIntjanandeAr:
      properties:
        artal:
          description: Intjänandeåret som avses.
          pattern: ^[0-9]{4}$
          type: string
        pensionsgrundandeInkomst:
          type: integer
        pensionsgrundandeBeloppForStudier:
          type: integer
        pensionsgrundandeBeloppForSjukOchAktivitetsersattning:
          type: integer
        pensionsgrundandeBeloppForArMedSmaBarn:
          type: integer
        pensionsgrundandeBeloppForPlikttjanst:
          type: integer
        pensionsgrundandeBeloppForFortidspension:
          type: integer
      type: object
    LefiPeriodMedValfrittTom:
      description: Identifierar en serie intilliggande datum som kan sakna ett slut.
      properties:
        from:
          description: Det första datumet i den avsedda perioden.
          format: date
          type: string
        tom:
          description: 'Det sista datumet i den avsedda perioden, om något.


            Detta kan vara samma datum som det första i perioden, vilket betyder att

            det bara är en dag som avses. Datumet kan också utelämnas, vilket i så

            fall alltså betyder att seriens slut inte är angivet.'
          format: date
          type: string
      required:
      - from
      type: object
