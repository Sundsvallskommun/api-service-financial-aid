        följande möjliga värden:


        - 1 = Tillfällig föräldrapenning (vanlig).

        - 2 = Tillfällig föräldrapenning för kontaktdag.

        - 3 = Tillfällig föräldrapenning i samband med barns födelse.

        - 4 = Tillfällig föräldrapenning i samband med barns adoption.

        - 5 = Tillfällig föräldrapenning då barnets ordinarie vårdgivare är sjuk.

        - 6 = Tillfällig föräldrapenning i samband med att barn har avlidit.'
      properties:
        fattades:
          description: Det datum beslutet fattades eller beviljandet gjordes av myndigheten.
          type: string
        definitivt:
          description: 'Avser huruvida beslutet är definitivt eller ej.


