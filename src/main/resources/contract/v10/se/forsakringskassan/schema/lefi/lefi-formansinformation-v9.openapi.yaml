          type: array
        utbetalningsuppgift:
          description: 'Uppgifter om effektuerade utbetalningar.


            Effektuerade utbetalningar har redan exekverats och därmed blivit

            uppgifter om historiska händelser.


            Exekvering innebär att utbetalande myndighet har initierat

            utbetalningsprocessen, inte att utbetalningsprocessen har fullbordats.
            På

            grund utav tiden det kan ta för pengar att flyttas mellan banker bör de

            flesta utbetalningar alltså ha tillfallit sina förmånstagare någon dag

            efter utbetalningsdatumen som anges i dem. I sällsynta fall kan det ta

            ännu längre tid på grund av att kontouppgifter saknas eller är felaktiga.

            Det finns för närvarande ingen information i LEFI om och när utbetalningar

            verkställts.'
