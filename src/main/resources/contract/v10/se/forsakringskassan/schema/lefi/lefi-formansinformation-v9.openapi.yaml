          items:
            $ref: '#/components/schemas/LefiYrkesskadelivrantaEgenArende'
          type: array
      type: object
    LefiPersoninformation:
      description: 'Uppgifter om en registrerad förmånstagare.


        Fältet `civilstand` avser förmånstagarens registrerade civilstånd och anges
        som en sifferkod med följande möjliga värden:


        - 0 = Okänd.

        - 1 = Ogift.

        - 2 = Gift.

        - 3 = Registrerat partnerskap.

        - 4 = Efterlevande partner.

        - 5 = Skild.

        - 6 = Skild partner.

        - 7 = Änka/Änkeman.'
      properties:
        personnummer:
          description: Förmånstagarens personnummer, bestående av 10 eller 12 siffror.
          pattern: ^([0-9]{2})?([0-9]{10})$
          type: string
        foddes:
          description: Förmånstagarens födelsedatum.
          type: string
        namn:
          description: Förmånstagarens alla namn.
          type: string
        skyddad:
          description: Huruvida personen i fråga har skyddad identitet eller ej.
          type: boolean
        avled:
          description: Datum då förmånstagarens avled, om alls.
          items:
            type: string
          maxItems: 1
          minItems: 0
          type: array
        adress:
          description: 'Listar förmånstagarens registrerade adresser i följande ordning:


            1. särskild adress,

            2. folbokföringsadress, och

            3. utlandsadresser.


            Alla, vissa eller inga av dessa adresser kan finnas tillgängliga för en

            given förmånstagare.'
          items:
            $ref: '#/components/schemas/LefiAdress'
          type: array
        arbetsstallen:
          description: 'Registrerade arbetsställen.


            Det eventuellt första avser huvudarbetsstället.'
          items:
            $ref: '#/components/schemas/LefiArbetsstalle'
          type: array
        barn:
          description: Förmånstagarens barn.
          items:
            $ref: '#/components/schemas/LefiPerson'
          type: array
        civilstand:
          $ref: '#/components/schemas/LefiSifferkod'
        folkbokford:
          description: Den eller de platser där förmånstagaren är folkbokförd
          items:
            $ref: '#/components/schemas/LefiFolkbokforingsuppgift'
          type: array
        medborgarskap:
          description: De länder där förmånstagaren har registrerade medborgarskap.
          items:
            $ref: '#/components/schemas/LefiMedborgarskap'
          type: array
        samhorig:
          description: Grunduppgifter om de personer som registrerats som anhöriga
            till förmånstagaren.
          items:
            $ref: '#/components/schemas/LefiPerson'
          type: array
      type: object
    LefiAdress:
      description: En adress.
      properties:
        roller:
          description: 'De funktioner adressen fyller.


            Varje funktion anges som en sifferkod med följande möjliga värden:


            - 1 = Folkbokföringsadress.

            - 2 = Särskild adress.

            - 3 = Utlandsadress.'
          items:
            $ref: '#/components/schemas/LefiSifferkod'
          type: array
        utdelningadress:
          description: Utdelningsadressrader.
          items:
            type: string
          type: array
        postnummer:
          description: Postnummer.
          type: string
        postort:
          description: Postort.
          type: string
        land:
          $ref: '#/components/schemas/LefiLand'
      type: object
    LefiSifferkod:
      description: 'En numerisk enumerator, vilken beskriver ett tillstånd ett ärende
        eller ett

        annat datum kan vara i. Enumeratorns betydelse beror alltså på dess

        sammanhang.'
