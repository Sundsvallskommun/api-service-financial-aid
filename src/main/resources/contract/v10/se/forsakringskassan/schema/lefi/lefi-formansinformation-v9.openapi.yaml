            Anges som en sifferkod med ett av följande möjliga värden:


            - 10 = Arbetsskador i allmänhet.

            - 11 = Utbildning, övrig (SFS 1977.284 2P).

            - 12 = Statlig Arbetskadeersättning (ej affärsverk).

            - 13 = Krigsskadeersättning till sjömän (SFS 1977.265).

            - 14 = Civilförsvarslagen (SFS 1977.265).

            - 15 = Räddningstjänst (SFS 1977.265).

            - 16 = Kriminalvården (SFS 1977.265).

            - 17 = Statligt anordnad utbildning (SFS 1977.284).

            - 18 = FN-tjänst.

            - 19 = Värnpliktslagen (SFS 1977.265).

            - 20 = Frivilliga värnpliktiga(SFS 1977.284 6P).

            - 50 = Statens Järnvägar.

            - 51 = Posten.

            - 52 = Telia.

            - 53 = Banverket.

            - 54 = Vattenfall.

            - 55 = Sveaskog (utgått 2008-07-01).

            - 56 = Affärsverksfonden (Celsius, Sveaskog, mm.).

            - 57 = Luftfartsverket.

            - 59 = Sjöfartsverket.

            - 60 = Stiftsnämnden.

            - 82 = Swebus AB.

            - 83 = SweFerry AB.

            - 84 = EuroMaint.'
