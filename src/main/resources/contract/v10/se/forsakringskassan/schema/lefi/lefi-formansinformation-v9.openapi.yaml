        beloppsfrekvens:
          $ref: '#/components/schemas/LefiPmFormanBeslutatBeloppFrekvens'
      type: object
    LefiPmFormanBeslutatBeloppFrekvens:
      description: Identifierar och beskriver tidsrymden ett belopp är beslutat för.
      properties:
        kod:
          $ref: '#/components/schemas/LefiPmFormanBeslutatBeloppFrekvensKod'
        beskrivning:
