      type: object
    LefiUnderhallsstodBeslut:
      description: 'Ett beslut i ett ärende om krav eller mottagande av underhållsstöd.


        Fälten `forman` och `delforman` innehåller beslutets förmåns- och

        delförmånskoder.


        Fältet `periodicitet` anger frekvensen med vilken den beslutade förmånen ska

        betalas ut. Den anges som en sifferkod med följande möjliga värden:


        - 0 = Ingen.

        - 1 = Månadsvis.

        - 2 = Kvartalsvis.

        - 3 = Halvårsvis.

        - 4 = Årsvis.


        Fältet `period` avser perioden för vilken förmånen är beslutad. Beroende på

        beslutets periodicitet kan perioden vara redovisad med reducerad granularitet.

        I vissa fall redovisas också en så kallad "öppen period", vilken saknar

        slutdatum.


        Fältet `ersattning` avser typ av ersättning och anges som en sifferkod med

        följande möjliga värden:


        - 1 = Helt.

        - 2 = Reducerat.

        - 3 = Reducerat till underhållsbidrag.

        - 4 = Utfyllnad.

        - 5 = Utfyllnad, reducerat.

        - 6 = Utfyllnad växelvis boende (enbart om mottagande).

        - 7 = Utfyllnad växelvis boende, reducerat (enbart om mottagande).


        Fältet `samordnatBruttobelopp` avser bruttobelopp samordnat med den andra

        föräldern.'
