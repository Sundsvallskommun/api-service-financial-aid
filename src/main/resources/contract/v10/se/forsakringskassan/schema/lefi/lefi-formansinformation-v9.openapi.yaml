    LefiAktivitetsstodUppgifter:
      description: 'Uppgifter av relevans för ett ärende om aktivitetsstöd.


        Fältet `atgardstyp` påvisar vilken typ av aktivitet ärendet avser. Det anges

        som en sifferkod med följande möjliga värden:


        - 1 = Arbetslivsinriktad utbildning.

        - 8 = AMU-reguljär.

        - 9 = IT-utbildning (upphörde 000801).

        - 11 = Start av näringsverksamhet.

        - 35 = Datortek.

        - 37 = Ungdomsgaranti.

        - 40 = Arbetspraktik.

        - 41 = Unga med funktionshinder.

        - 44 = Aktivitetsgaranti (upphörde 001113).

        - 45 = Projekt med arbetsmarknadspolitisk inriktning.

        - 46 = Vägledning.

        - 50 = AMU-upphandlad (ersätter kod 00 from 001113).

        - 51 = Friår.

        - 52 = Fördjupad kartläggning och vägledning.

        - 53 = Jobb och utvecklingsgaranti, fas 1 och 2.

        - 54 = Jobbgaranti för ungdomar.

        - 55 = Jobbgaranti för ungdomar med funktionshinder.

        - 56 = Jobb- och utvecklingsgaranti, unga med funktionshinder.

        - 57 = Jobb- och utvecklingsgaranti fas 3.

        - 58 = Jobb- och utvecklingsgaranti fas 3, unga med funktionshinder.

        - 59 = Arbetslivsintroduktion.

        - 60 = Arbetslivsintroduktion, ung med funktionshinder.

        - 99 = övrigt.'
      properties:
        atgardstyp:
          $ref: '#/components/schemas/LefiSifferkod'
      type: object
    LefiAktivitetsstodBeslut:
      description: 'Beskriver ett beslut om aktivitetsstöd.


        Fälten `forman` och `delforman` innehåller beslutets förmåns- och delförmånskoder.


        Fältet `periodicitet` anger frekvensen med vilken den beslutade förmånen ska

        betalas ut. Den anges som en sifferkod med följande möjliga värden:


        - 0 = Ingen.

        - 1 = Månadsvis.

        - 2 = Kvartalsvis.

        - 3 = Halvårsvis.

        - 4 = Årsvis.


        Fältet `period` avser perioden för vilken förmånen är beslutad. Beroende på

        beslutets periodicitet kan perioden vara redovisad med reducerad granularitet.

        I vissa fall redovisas också en så kallad "öppen period", vilken saknar

        slutdatum.


        Fältet `ersattning` avser typen av ersättning ärendet gäller och anges som
        en

        sifferkod med följande möjliga värden:


        - 1 = Aktivitetsstöd.

        - 2 = Särskilt bidrag.

        - 3 = Utvecklingsersättning.'
      properties:
        fattades:
          description: Det datum beslutet fattades eller beviljandet gjordes av myndigheten.
          type: string
        definitivt:
          description: 'Avser huruvida beslutet är definitivt eller ej.


            Definitiva beslut kan fortfarande överklagas. Ett definitivt beslut är

            aldrig att betrakta som provisoriskt eller preliminärt.'
          type: boolean
        forman:
          $ref: '#/components/schemas/LefiBokstavskod'
        delforman:
          $ref: '#/components/schemas/LefiBokstavskod'
        periodicitet:
          $ref: '#/components/schemas/LefiSifferkod'
        period:
          $ref: '#/components/schemas/LefiFranTill'
        beslutatBruttobelopp:
          $ref: '#/components/schemas/LefiBelopp'
        dagar:
          description: 'Antal ersatta dagar under utbetalningsperioden.


            Detta fält kan komma att tas bort i en framtida version av denna typ.'
          type: integer
        karens:
          description: Karensdag.
          type: boolean
        ersattning:
          $ref: '#/components/schemas/LefiSifferkod'
      type: object
    LefiBokstavskod:
      description: 'En bokstavsbaserad enumerator, vilken beskriver ett tillstånd
        ett ärende eller

        ett annat datum kan vara i. Enumeratorns betydelse beror alltså på dess

        sammanhang.'
      properties:
        id:
          description: Enumeratorns bokstavsvärde.
          type: string
        beskrivning:
          description: 'Ett eller ett fåtal ord som beskriver det aktuella bokstavsvärdet
            på

            svenska.'
          type: string
      type: object
    LefiFranTill:
      description: 'Period uttryckt som ett eller två datum.


        Ett exempel på ett datum kan vara `2023-12-14`, vilket beskriver den 14:e

        december året 2023. Datum kan också sakna dagangivelse. Ett exempel på ett

        sådant datum kan vara `2022-09`.


        Är bara ett datum angett är perioden "öppen", med vilket menas att den saknar

        början eller slut.'
      properties:
        fran:
          description: Periodens första dag.
          type: string
        till:
          description: Periodens sista dag.
          type: string
      type: object
    LefiBelopp:
      description: Ett belopp, beskrivet som en summa och en valuta.
      properties:
        summa:
          description: Antalet enheter av valutan som avses. Kan innehålla decimaler.
          format: double
          type: number
        valuta:
          description: 'Anger typen av valuta. Värdet bör vara ett av dem definierade
            i ISO4217,

            såsom "SEK".'
          type: string
      type: object
    LefiAllmanpensionArende:
      description: Information om ett ärende om allmän pension.
      properties:
        beslut:
          description: Beslut fattade i ärendet.
          items:
            $ref: '#/components/schemas/LefiAllmanpensionBeslut'
          type: array
      type: object
    LefiAllmanpensionBeslut:
      description: 'Beslut om allmän pension.


        Vissa skillnader förekommer i vilka data som presenteras och vad de innebär
        om

        beslutet rör en person som är född före eller efter första januari 1938. De

        pensioner som betalas ut till dessa två grupper kallas för ÅP37 respektive

        ÅP38, där ÅP står för _ålderspension_.


        Fälten `forman` och `delforman` innehåller beslutets förmåns- och

        delförmånskoder.


        Fältet `periodicitet` anger frekvensen med vilken den beslutade förmånen ska

        betalas ut. Den anges som en sifferkod med följande möjliga värden:


        - 0 = Ingen.

        - 1 = Månadsvis.

        - 2 = Kvartalsvis.

        - 3 = Halvårsvis.

        - 4 = Årsvis.


        Fältet `period` avser perioden för vilken förmånen är beslutad. Beroende på

        beslutets periodicitet kan perioden vara redovisad med reducerad granularitet.

        I vissa fall redovisas också en så kallad "öppen period", vilken saknar

        slutdatum.


        Fältet `omfattning` avser andelen av pensionen förmånstagaren tar ut. Kan

        vara: 25%, 50%, 75% eller 100%.'
      properties:
        fattades:
          description: Det datum beslutet fattades eller beviljandet gjordes av myndigheten.
          type: string
        definitivt:
          description: 'Avser huruvida beslutet är definitivt eller ej.


            Definitiva beslut kan fortfarande överklagas. Ett definitivt beslut är

            aldrig att betrakta som provisoriskt eller preliminärt.'
          type: boolean
        forman:
          $ref: '#/components/schemas/LefiBokstavskod'
        delforman:
          $ref: '#/components/schemas/LefiBokstavskod'
        periodicitet:
          $ref: '#/components/schemas/LefiSifferkod'
        period:
          $ref: '#/components/schemas/LefiFranTill'
        beslutatBruttobelopp:
          $ref: '#/components/schemas/LefiBelopp'
        samordnatBruttobelopp:
          $ref: '#/components/schemas/LefiBelopp'
        omfattning:
          $ref: '#/components/schemas/LefiOmfattning'
      type: object
    LefiArbetsskadelivrantaEfterlevandeArende:
