          $ref: '#/components/schemas/LefiFranTill'
        omfattning:
          $ref: '#/components/schemas/LefiOmfattning'
        andel:
          $ref: '#/components/schemas/LefiOmfattning'
        utbetalningstyp:
          $ref: '#/components/schemas/LefiBokstavskod'
      type: object
    LefiOmvardnadsbidragUnderlag:
      description: Ett underlag till ett beslut taget i ett ärende om omvårdnadsbidrag.
      properties:
        Barn:
          description: De barn beslutet avser.
          items:
            $ref: '#/components/schemas/LefiPerson'
          minItems: 1
          type: array
      type: object
    LefiUtbetalningUppgift:
      description: 'Uppgifter om en preliminär eller effektuerad utbetalning.


        Fältet `typ` avser hur utbetalningen har verkställts, eller hur den ska

        verkställas. Anges som en sifferkod med något av följande värden:


        - 0 = Lokal utbetalning.

        - 1 = Månad.

        - 2 = Daglig.

        - 3 = Retro.

        - 4 = Presumtiv.


        Fältet `foretag` identifierar utbetalande myndighet. Anges som en sifferkod

        med något av följande värden:


        - 1001 = Försäkringskassan.

        - 1003 = Pensionsmyndigheten.


        Fältet `period` avser periodens om täcks av utbetalningen.


        Fälten `bruttobelopp`, `skattebelopp`, `avdragsbelopp` och `nettobelopp` avser

        totalerna av alla utbetalningsdetaljerna i uppgiften. Notera att

        avdragsbeloppet inkluderar skattebeloppet, då skatt också räknas som avdrag.'
      properties:
        typ:
          $ref: '#/components/schemas/LefiSifferkod'
        foretag:
          $ref: '#/components/schemas/LefiSifferkod'
        formansfamilj:
          $ref: '#/components/schemas/LefiBokstavskod'
        datum:
          description: 'Utbetalningsdatum.


            Avser alltså det datum då utbetalningen har eller ska effektueras.


            Notera att effektuering enbart innebär att utbetalning påbörjats. Det

            innebär inte nödvändigtvis att beloppet tillfallit förmånstagaren.'
          type: string
        period:
          $ref: '#/components/schemas/LefiFranTill'
        bruttobelopp:
          $ref: '#/components/schemas/LefiBelopp'
        skattebelopp:
          $ref: '#/components/schemas/LefiBelopp'
        avdragsbelopp:
          $ref: '#/components/schemas/LefiBelopp'
        nettobelopp:
          $ref: '#/components/schemas/LefiBelopp'
        utbetalningsdetalj:
          description: Utbetalningsrader.
          items:
            $ref: '#/components/schemas/LefiUtbetalningDetalj'
          type: array
      type: object
    LefiUtbetalningDetalj:
      description: 'En rad, eller delmängd, av en utbetalningsuppgift.


        Fältet `forman` avser utbetalningsförmånen, vilken identifierar delförmånen

        som avses av utbetalningsraden. Det råder nästan ett ett-till-ett förhållande

        mellan detta värde och förmånsfamiljen i utbetalningsuppgiften som innehåller

        den här detaljen.


        Fältet `period` avser perioden som täcks av utbetalningen.


        Fältet `beloppstyp` identifierar en typ av ersättning eller en typ av avdrag.


        Följande beloppstyper avser avdrag:


        - AFR = Avdrag annan ersättning eller föräldra- eller rehabiliteringsersättning
        (historisk).

        - ALA = Avdrag på grund av lön.

        - ART = Utländsk fordran artikel 68a.

        - AVB = Avbetalning (historisk).

        - AVR = Avräkning (historisk).

        - FMF = Förlängt familjebidrag (historisk).

        - FUM = Avdrag fullmakt (historisk).

        - INC = Innehållet för CSN.

        - INF = Utmätning.

        - INM = Innehållet manuellt.

        - INU = Innehållet underhållsstöd (historisk).

        - KOA = Kontraktsvårdsavdrag.

        - KVI = Kvittning.

        - OAV = Ospecificerade avdrag.

        - PF = Skatt föregående år (historisk).

        - PS = Preliminär skatt.

        - PST = Preliminär skatt tidigare år.

        - SAV = Slutavräkning (historisk).

        - SKV = Kvittning statlig fordran.

        - SOC = Socialavdrag.

        - SS = Särskild inkomstskatt.

        - SST = Särskild inkomstskatt tidigare år.

        - UMG = Umgängesavdrag.

        - UTF = Avdrag för utländsk fordran.

        - ÅFA = Återbetalning frivillig försäkring.

        - ÖVA = Icke specificerade avdrag (historisk).


        Övriga beloppstyper avser typer av ersättningar.


        Fältet `bruttobelopp` avser bruttobelopp, vilket är beloppet som avses av

        raden om den inte beskriver skatt eller ett annat avdrag.


        Fältet `skattebelopp` avser skattebelopp, vilket är beloppet som avses av

        raden om dess beloppstyp är `PS` eller `SS`.


        Fälet `avdragsbelopp` avser avdragsbelopp, vilket är beloppet som avses av

        raden om dess beloppstyp är en annan avdragstyp än `PS` eller `SS`.'
      properties:
        forman:
          $ref: '#/components/schemas/LefiBokstavskod'
        period:
          $ref: '#/components/schemas/LefiFranTill'
        beloppstyp:
          $ref: '#/components/schemas/LefiBokstavskod'
        omfattning:
          $ref: '#/components/schemas/LefiOmfattning'
        dagar:
          description: Antal avsedda dagar.
          type: integer
        timmar:
          description: Antal avsedda timmar.
          type: integer
        bruttobelopp:
          $ref: '#/components/schemas/LefiBelopp'
        skattebelopp:
          $ref: '#/components/schemas/LefiBelopp'
        avdragsbelopp:
          $ref: '#/components/schemas/LefiBelopp'
      type: object
    LefiProgramanvisning:
      description: 'Uppgifter om anvisning till Arbetsmarknadspolitiskt program.


        Fältet `program` avser det program som Arbetsförmedlingen aviserat att

        deltagaren blivit anvisad till. Denna information kan ändras över tid utifrån

        ändrade verksamhetsregler. Programmet anges som en sifferkod med följande

        möjliga värden:


        - 0 = AMU-upphandlad.

        - 1 = Förberedande insatser.

        - 2 = AMU-Ledsagare.

        - 3 = AMU-Ledsagare.

        - 4 = Jobbsökaraktiviteter.

        - 5 = Vidgad arbetsprövning.

        - 6 = Ungdomspraktik.

        - 8 = Arbetsmarknadsutbildning.

        - 9 = IT-utbildning.

        - 11 = Stöd till start av näringsverksamhet.

        - 35 = Datortek.

        - 37 = Ungdomsgaranti.

        - 40 = Arbetspraktik.

        - 41 = Unga med funktionshinder.

        - 43 = Offentlig Tillfällig Anställning.

        - 44 = Aktivitetsgaranti.

        - 45 = Projekt med arbetsmarknadspolitisk inriktning.

        - 46 = Förberedande insatser.

        - 50 = Förberedande insatser.

        - 51 = Friår.

        - 52 = Förberedande insatser.

        - 53 = Jobb- och utvecklingsgaranti.

        - 54 = Jobbgaranti för ungdomar.

        - 55 = Jobbgaranti för ungdomar med funktionshinder.

        - 56 = Jobb- och utvecklingsgaranti, unga funktionshindrade.

        - 57 = Jobb- och utvecklingsgaranti fas 3.

        - 58 = Jobb- och utvecklingsgaranti fas 3, unga funktionshindrade.

        - 59 = Arbetslivsintroduktion.

        - 60 = Arbetslivsintroduktion, unga funktionshindrade.

        - 61 = Validering.

        - 62 = Förberedande insatser.

        - 63 = Etableringsinsatser.

        - 64 = Kartläggningsfasen inom etableringsinsatser.

        - 99 = Övrigt.'
      properties:
        period:
          $ref: '#/components/schemas/LefiFranTill'
        omfattning:
          $ref: '#/components/schemas/LefiOmfattning'
        program:
          $ref: '#/components/schemas/LefiSifferkod'
      type: object
    LefiProgramersattningArende:
      description: Ett ärende om ersättning som en del av ett Arbetsmarknadspolitiskt
        program.
      properties:
        beslut:
          description: Beslut fattade i ärendet.
          items:
            $ref: '#/components/schemas/LefiProgramersattningBeslut'
          type: array
      type: object
    LefiProgramersattningBeslut:
      description: 'Ett beslut i ett ärende om ersättning som en del av ett

        Arbetsmarknadspolitiskt program.


        Fälten `forman` och `delforman` innehåller beslutets förmåns- och

        delförmånskoder.


        Fältet `periodicitet` anger frekvensen med vilken den beslutade förmånen ska

        betalas ut. Den anges som en sifferkod med följande möjliga värden:


        - 0 = Ingen.

        - 1 = Månadsvis.

        - 2 = Kvartalsvis.

        - 3 = Halvårsvis.

        - 4 = Årsvis.


        Fältet `period` avser perioden för vilken förmånen är beslutad. Beroende på

        beslutets periodicitet kan perioden vara redovisad med reducerad granularitet.

        I vissa fall redovisas också en så kallad "öppen period", vilken saknar

        slutdatum.'
      properties:
        fattades:
          description: Det datum beslutet fattades eller beviljandet gjordes av myndigheten.
          type: string
        definitivt:
          description: 'Avser huruvida beslutet är definitivt eller ej.


            Definitiva beslut kan fortfarande överklagas. Ett definitivt beslut är

            aldrig att betrakta som provisoriskt eller preliminärt.'
          type: boolean
        forman:
          $ref: '#/components/schemas/LefiBokstavskod'
        delforman:
          $ref: '#/components/schemas/LefiBokstavskod'
        periodicitet:
          $ref: '#/components/schemas/LefiSifferkod'
        period:
          $ref: '#/components/schemas/LefiFranTill'
        beslutatBruttobelopp:
          $ref: '#/components/schemas/LefiBelopp'
        ersattningsdagar:
          description: Information om de olika kalenderdagar som berörs av beslutet.
          items:
            $ref: '#/components/schemas/LefiProgramersattningDag'
          type: array
        dagar:
          items:
            type: string
          type: array
        ersattning:
          $ref: '#/components/schemas/LefiBokstavskod'
      type: object
    LefiProgramersattningDag:
      description: 'Information om en kalenderdag som berörs av ett beslut om ersättning
        som en

        del av ett Arbetsmarknadspolitiskt program.


        Fältet `ersattning` avser typ av ersättning och anges som en bokstavskod med

        följande möjliga värden:


        - AS = Aktivitetsstöd.

        - EE = Etableringsersättning.

        - UE = Utvecklingsersättning.'
      properties:
        dag:
          description: Kalenderdagen som avses.
          type: string
        ersattning:
          $ref: '#/components/schemas/LefiBokstavskod'
        belopp:
          $ref: '#/components/schemas/LefiBelopp'
      type: object
    LefiProgramjobdagar:
      description: 'Uppgifter om dagar förbrukade under deltagande i Arbetsmarknadspolitiskt

        program med jobb- och utvecklingsgaranti.'
      properties:
        antalForbrukade:
          description: Antalet förbrukade dagar.
          type: integer
        harForbrukatMaxAntal:
          description: Huruvida deltagaren förbrukat alla sina dagar.
          type: boolean
      type: object
    LefiRehabersattningArende:
      description: Ett ärende om rehabiliteringsersättning.
      properties:
        startades:
          description: 'Det datum då ärendet startades, vilket normalt är när en ansökan
            ankom

            till myndigheten.'
          type: string
        aktivt:
          description: Huruvida ärendet är aktivt.
          type: boolean
        beslut:
          description: Beslut fattade i ärendet.
          items:
            $ref: '#/components/schemas/LefiRehabersattningBeslut'
          type: array
      type: object
    LefiRehabersattningBeslut:
      description: 'Ett beslut fattat i ett ärende om rehabilitersingsersättning.


        Fältet `forman` innehåller beslutets förmånskod.


        Fältet `period` avser perioden för vilken förmånen är beslutad.


        Fältet `omfattning` avser förmånens omfattning för de utbetalda dagarna.'
      properties:
        karens:
          type: boolean
        beslutsutfall:
          type: string
        beslutstyp:
          type: string
        fattades:
          description: Det datum beslutet fattades eller beviljandet gjordes av myndigheten.
          type: string
        definitivt:
          description: 'Avser huruvida beslutet är definitivt eller ej.


            Definitiva beslut kan fortfarande överklagas. Ett definitivt beslut är

            aldrig att betrakta som provisoriskt eller preliminärt.'
          type: boolean
        forman:
          $ref: '#/components/schemas/LefiBokstavskod'
        period:
          $ref: '#/components/schemas/LefiFranTill'
        omfattning:
          $ref: '#/components/schemas/LefiOmfattning'
        dagar:
          description: Antal ersatta dagar under utbetalningsperioden.
          type: integer
        ersattning:
          description: 'Avser ersättningen från ansökan beslutet avser. Bör innehålla
            något av värdena:


            - `REHABPENNING` (Rehabiliteringspenning),

            - `REHABPENNING_SF` (Rehabiliteringspenning i särskilda fall),

            - `RESERSATTNING` (Resersättning),

            - `TRAKTAMENTEN` (Traktamenten),

            - `KURSAVGIFT` (Kursavgift),

            - `LAROMEDEL` (Läromedel) eller

            - `FORSKOTT_SARSKILT_BIDRAG` (Förskott särskilt bidrag).


            Andra värden kan förekomma.'
          type: string
        ersattningsniva:
          description: 'Beslutad ersättningsnivå. Bör innehålla något av värdena:


            - `NORMAL` (Förebyggande sjukpenning),

            - `FORTSATTNING` (Förebyggande sjukpenning på fortsättningsnivå),

            - `FLER_NORM` (Fler dagar med förebyggande sjukpenning på normalnivå)
            eller

            - `INGEN` (Ingen ersättning).


            Andra värden kan förekomma.'
          type: string
        ersattningsdagar:
          description: Beslutade ersättningsdagar.
          items:
            $ref: '#/components/schemas/LefiRehabersattningDag'
          type: array
      type: object
    LefiRehabersattningDag:
      description: "En del av ett beslut om rehabiliteringsersättning som berör en\
        \ specifik\nkalenderdag. \n\nFältet `ersattningsbelopp` avser beslutat bruttobelopp.\n\
        \nFältet `karensavdragsbelopp` avser beslutat karensavdragsbelopp."
      properties:
        ersattningsdatum:
          description: Kalenderdag som avses av beslutet.
          type: string
        ersattningsbelopp:
          $ref: '#/components/schemas/LefiBelopp'
        karensavdragsbelopp:
          $ref: '#/components/schemas/LefiBelopp'
      type: object
    LefiSjukOchAktivitetsersattningArende:
      description: Ett ärende om sjuk- och aktivitetsersättning.
      properties:
        startades:
